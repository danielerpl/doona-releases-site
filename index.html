<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installazione Doona Simulator</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f7; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: inline-block; }
        .btn {
            display: inline-block; background-color: #007aff; color: white; padding: 15px 30px;
            border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px;
        }
        .note { color: #888; font-size: 0.8em; margin-top: 20px; }
        .version { color: #555; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Doona Peripheral Simulator</h1>
        <p id="versionText">Loading version...</p>

        <!-- URL aggiornato: punta al nostro worker -->
        <a class="btn" href="itms-services://?action=download-manifest&url=https%3A%2F%2Fdoona-releases-site.pages.dev%2Fapi%2Fmanifest"> 
            👉 Install Doona Simulator (Latest Build)
        </a>

        <p class="note">Note: You <b>must</b> use <b>Safari</b> on iPhone/iPad</p>
    </div>

    <script>
        // Fetch the version from the API
        async function loadVersion() {
            try {
                const response = await fetch('/api/version');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('versionText').textContent = `Version ${data.displayVersion}`;
                } else {
                    document.getElementById('versionText').textContent = 'Latest Build';
                }
            } catch (error) {
                console.error('Error loading version:', error);
                document.getElementById('versionText').textContent = 'Latest Build';
            }
        }

        loadVersion();
    </script>
</body>
</html>
